spring:
  main:
    web-application-type: reactive
  cloud:
    # Config Server bağlantısı geçici olarak devre dışı (route'lar local'den yüklenecek)
    # config:
    #   uri: http://config-server:8888
    gateway:
      actuator:
        verbose:
          enabled: true
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: account-service
          uri: lb://account-service-application
          predicates:
            - Path=/account/**
          filters:
            - name: CircuitBreaker
              args:
                name: account
                fallbackUri: forward:/fallback/account
        - id: ledger-service
          uri: lb://ledger-service-application
          predicates:
            - Path=/ledger/**
          filters:
            - name: CircuitBreaker
              args:
                name: ledger
                fallbackUri: forward:/fallback/ledger
        - id: fraud-service
          uri: lb://fraud-service-application
          predicates:
            - Path=/fraud/**
          filters:
            - name: CircuitBreaker
              args:
                name: fraud
                fallbackUri: forward:/fallback/fraud
        - id: notification-service
          uri: lb://notification-service-application
          predicates:
            - Path=/notification/**
          filters:
            - name: CircuitBreaker
              args:
                name: notification
                fallbackUri: forward:/fallback/notification
    loadbalancer:
      cache:
        ttl: 3s
  config:
    import: "optional:configserver:"
    fail-fast: false
  application:
    name: api-gateway-service-application

  security:
    oauth2:
      resourceserver:
        jwt:
          # Config Server ile ayni: sadece jwk-set-uri (issuer-uri + localhost token iss catismasi onlenir)
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8180/realms/master/protocol/openid-connect/certs}

# Windows'ta 80 icin yonetici hakki gerekir; IDE'de sorun olursa: --server.port=9080 (Ledger vb. gateway URL'lerini guncelleyin)
server:
  port: ${SERVER_PORT:80}

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      # IDE: 127.0.0.1. Docker: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://127.0.0.1:8761/eureka/}
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
    prefer-ip-address: ${EUREKA_INSTANCE_PREFER_IP_ADDRESS:false}
    non-secure-port: ${server.port}

management:
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_BASE_URL:http://127.0.0.1:9411}/api/v2/spans
  tracing:
    sampling:
      probability: 1
  endpoints:
    web:
      exposure:
        include: gateway,health,info
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.cloud.loadbalancer: DEBUG
    com.netflix.discovery: DEBUG
