server:
  port: 9592

spring:

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:127.0.0.1}:${POSTGRES_PORT:9999}/Micro_LedgerServiceDB

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:${KAFKA_BOOTSTRAP_SERVERS:redpanda:9092}}
    template:
      observation-enabled: true
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      # Producer acks (mesajın başarılı gönderilip gönderilmediğini kontrol için):
      acks: all
    consumer:
      group-id: ledger-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

    # Consumer concurrency (birden fazla thread ile paralel tüketim):
    # Özellikle yüksek performanslı finansal sistemlerde concurrency ve partition sayısı kritik.
    listener:
      observation-enabled: true
      concurrency: 2

ledger:
  account-service:
    # Docker: ACCOUNT_SERVICE_BASE_URL=http://api-gateway/account/ (compose)
    base-url: ${ACCOUNT_SERVICE_BASE_URL:http://localhost:80/account/}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    # IDE/host: 'localhost' kayit. Windows Hyper-V/mshome.net FQDN'sini Netty DNS resolver cozemiyor.
    # Docker konteyner: EUREKA_INSTANCE_HOSTNAME=ledger-service (compose service adi)
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
    prefer-ip-address: ${EUREKA_INSTANCE_PREFER_IP_ADDRESS:false}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_BASE_URL:http://127.0.0.1:9411}/api/v2/spans
  tracing:
    propagation:
      type: b3
    sampling:
      probability: 1.0
